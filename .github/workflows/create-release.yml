name: Create Release from Artifacts

on:
  workflow_dispatch:  # Permet un déclenchement manuel
    inputs:
      tag_name:
        description: 'Nom du tag pour la release (ex: v1.0.0)'
        required: true
      release_name:
        description: 'Nom de la release (ex: Initial Release)'
        required: false
      body:
        description: 'Description de la release'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Lister les artefacts du workflow précédent
      - name: List artifacts from Unity Build Pipeline
        id: list_artifacts
        run: |
          artifacts=$(gh run list --workflow="build-unity.yml" --json conclusion,artifacts --jq '.[] | select(.conclusion == "success") | .artifacts[].name')
          echo "ARTIFACTS=$artifacts" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Étape 2 : Télécharger chaque artefact
      - name: Download artifacts
        run: |
          mkdir -p artifacts
          for artifact in $ARTIFACTS; do
            gh artifact download "$artifact" --dir artifacts
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Étape 3 : Créer une release
      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          release_name: ${{ github.event.inputs.release_name || github.event.inputs.tag_name }}
          body: ${{ github.event.inputs.body || 'Release description' }}
          draft: false
          prerelease: false

      # Étape 4 : Ajouter les artefacts à la release
      - name: Upload artifacts to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts
          asset_name: ${{ github.event.inputs.tag_name }}.zip
          asset_content_type: application/zip
