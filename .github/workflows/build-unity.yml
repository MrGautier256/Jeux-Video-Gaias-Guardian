name: Unity Build Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

#SonarQube steps Part 1 start
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu' # Alternative distribution options are available.
    - name: Cache SonarQube Cloud packages
      uses: actions/cache@v4
      with:
        path: ~\sonar\cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    - name: Cache SonarQube Cloud scanner
      id: cache-sonar-scanner
      uses: actions/cache@v4
      with:
        path: .\.sonar\scanner
        key: ${{ runner.os }}-sonar-scanner
        restore-keys: ${{ runner.os }}-sonar-scanner
    - name: Install SonarQube Cloud scanner
      if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        New-Item -Path .\.sonar\scanner -ItemType Directory
        dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner
#SonarQube steps Part 1 end

    - name: List files at root
      run: |
        pwd
        ls -la # Sur Linux

    - name: Cache Unity Library
      uses: actions/cache@v3
      with:
        path: src/Library
        key: Library-${{ runner.os }}-${{ hashFiles('src/**/*.cs') }}
        restore-keys: |
          Library-${{ runner.os }}-
    - name: Check system resources
      run: |
        free -h
        df -h
        ulimit -a

    - name: Debug scenes list
      run: |
        echo "Scenes in EditorBuildSettings:"
        cat src/ProjectSettings/EditorBuildSettings.asset | grep -A 1 path
        cd /home/runner/work/Jeux-Video-Gaias-Guardian/Jeux-Video-Gaias-Guardian/src

    - name: Build Unity project
      uses: game-ci/unity-builder@v4.3.0
      with:
        unityVersion: 6000.0.40f1
          # 2021.3.16f1
        targetPlatform: StandaloneWindows64
        projectPath: src  
        buildName: GaiasGuardian
        customParameters: -logFile /dev/stdout -debugCodeOptimization
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

#SonarQube steps Part 2 start
    - name: Build and analyze
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      shell: powershell
      run: |
        .\.sonar\scanner\dotnet-sonarscanner begin /k:"MrGautier256_Jeux-Video-Gaias-Guardian" /o:"mrgautier256" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io"
        dotnet build
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
#SonarQube steps Part 2 end

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Build
        path: build/**
        
    - name: Vérifier les fichiers générés
      run: ls -laR src
        
