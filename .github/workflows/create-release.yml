name: Create Release from Artifacts

on:
  workflow_dispatch:  # Permet un déclenchement manuel
    inputs:
      tag_name:
        description: 'Nom du tag pour la release (ex: v1.0.0)'
        required: true
      release_name:
        description: 'Nom de la release (ex: Initial Release)'
        required: false
      body:
        description: 'Description de la release'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Télécharger les artefacts depuis un autre workflow
      - name: Download artifacts
        uses: actions/download-artifact
        with:
          name: build-unity  # Nom utilisé lors du téléversement
          path: ./artifacts

      # Étape 2 : Créer une release
      - name: Create GitHub release
        id: create_release
        uses: actions/create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          release_name: ${{ github.event.inputs.release_name || github.event.inputs.tag_name }}
          body: ${{ github.event.inputs.body || 'Release description' }}
          draft: false
          prerelease: false

      # Étape 3 : Ajouter les artefacts à la release
      - name: Upload artifact to release
        uses: actions/upload-release-asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts # Chemin des artefacts téléchargés
          asset_name: build-artifacts.zip
          asset_content_type: application/zip